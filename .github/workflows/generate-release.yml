name: Generate Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Check Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check app version and tag
        id: version
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$APP_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::src-tauri/tauri.conf.json version ($APP_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

          TAG="v${APP_VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            SHOULD_RELEASE="false"
            echo "Tag ${TAG} already exists. Skipping release."
          else
            SHOULD_RELEASE="true"
            echo "Tag ${TAG} does not exist. Release will be generated."
          fi

          {
            echo "version=${APP_VERSION}"
            echo "tag=${TAG}"
            echo "should_release=${SHOULD_RELEASE}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }} Installer
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact_name: linux-installers
            artifact_paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/rpm/*.rpm
          - name: Windows
            os: windows-latest
            artifact_name: windows-installers
            artifact_paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS
            os: macos-latest
            artifact_name: macos-installers
            artifact_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri installer
        run: npm run tauri:build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - version
      - build
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload installers
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists. Nothing to do."
            exit 0
          fi

          shopt -s globstar nullglob
          files=()
          for f in release-assets/**/*; do
            [[ -f "$f" ]] && files+=("$f")
          done
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No installer artifacts were downloaded."
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${files[@]}" \
            --repo "$GH_REPO" \
            --target "$GITHUB_SHA" \
            --title "Dev Core Tools ${RELEASE_TAG}" \
            --generate-notes
